<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open When... | For Victory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Fira+Code:wght@300..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Open When You Need Me</h1>
        <p>A digital collection of letters for every moment.</p>

        <div class="counter-container">
            <p>We've been together for:</p>
            <div id="together-counter">
                <span id="days">0</span> days,
                <span id="hours">0</span> hours,
                <span id="minutes">0</span> minutes
            </div>
        </div>
    </header>

    <main class="envelope-grid" id="grid">
        <div class="envelope" onclick="openLetter('first-time')">
            <div class="stamp">😁</div>
            <span>Open when...</span>
            <h3>You Recieve this</h3>
        </div>

        <div class="envelope" onclick="openLetter('miss-me')">
            <div class="stamp">❤️</div>
            <span>Open when...</span>
            <h3>You miss me</h3>
        </div>
        
        <div class="envelope" onclick="openLetter('stressed')">
            <div class="stamp">🌿</div>
            <span>Open when...</span>
            <h3>You're stressed</h3>
        </div>

        <div class="envelope" onclick="openLetter('disagreement')">
            <div class="stamp">🤝</div>
            <span>Open when...</span>
            <h3>We disagree</h3>
        </div>

        <div class="envelope" onclick="openLetter('insecure')">
            <div class="stamp">✨</div>
            <span>Open when...</span>
            <h3>You feel insecure</h3>
        </div>
    </main>

    <div id="letterModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLetter()">&times;</span>
            <div id="letterText">
                </div>
        </div>
    </div>

</body>
</html>
